<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>廃病院 — Horror Text Adventure</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d0d0f;
      --surface:     #1a1a20;
      --border:      #2a2a35;
      --accent:      #2dd4bf;
      --accent-glow: rgba(45, 212, 191, 0.15);
      --danger:      #ef4444;
      --danger-glow: rgba(239, 68, 68, 0.15);
      --text:        #e2e8f0;
      --text-muted:  #94a3b8;
      --radius:      12px;
      --trans:       0.3s ease;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100dvh;
    }

    /* ── Header ── */
    .g-header {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      background: rgba(13,13,15,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .g-header__logo {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .g-header__nav { display: flex; gap: 1rem; align-items: center; }
    .g-header__link {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color var(--trans);
    }
    .g-header__link:hover { color: var(--accent); }
    .g-header__restart {
      background: none;
      border: 1.5px solid var(--border);
      color: var(--text-muted);
      padding: 0.4rem 1rem;
      border-radius: var(--radius);
      font-size: 0.82rem;
      font-family: inherit;
      cursor: pointer;
      transition: border-color var(--trans), color var(--trans);
    }
    .g-header__restart:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Main ── */
    .g-main {
      position: relative;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6rem 2rem 4rem;
      overflow: hidden;
    }

    /* ── Background glow ── */
    .g-glow {
      position: absolute;
      top: 40%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      pointer-events: none;
      transition: background 1s ease;
    }
    .g-glow--danger  { background: radial-gradient(circle, var(--danger-glow) 0%, transparent 70%); }
    .g-glow--end-good {
      background: radial-gradient(circle, rgba(45,212,191,0.3) 0%, transparent 70%);
      animation: pulse-good 2s ease-in-out infinite;
    }
    .g-glow--end-bad { background: radial-gradient(circle, rgba(239,68,68,0.25) 0%, transparent 70%); }

    /* ── Inner wrapper ── */
    .g-inner {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
      animation: fadein 0.6s ease;
    }

    /* ── Inventory ── */
    .g-status { display: flex; gap: 0.5rem; flex-wrap: wrap; min-height: 2rem; margin-bottom: 1rem; }
    .g-item {
      padding: 0.25rem 0.75rem;
      background: rgba(45,212,191,0.1);
      border: 1px solid rgba(45,212,191,0.3);
      border-radius: 100px;
      font-size: 0.78rem;
      color: var(--accent);
    }

    /* ── Text box ── */
    .g-box {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem 2.5rem;
      min-height: 260px;
      margin-bottom: 1.5rem;
      cursor: pointer;
      transition: border-color var(--trans), opacity 0.3s ease;
    }
    .g-box::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg,
        transparent 0, transparent 2px,
        rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
      pointer-events: none;
      border-radius: inherit;
    }
    .g-box--danger { border-color: rgba(239,68,68,0.3); }
    .g-box--faded  { opacity: 0; }

    .g-text { font-size: 1rem; line-height: 1.9; position: relative; }
    .g-text p + p  { margin-top: 1rem; }

    .g-cursor {
      display: inline-block;
      width: 0.6em; height: 1.2em;
      background: var(--accent);
      vertical-align: text-bottom;
      margin-left: 2px;
      animation: blink 0.8s step-end infinite;
    }
    .g-cursor--off { display: none; }

    .g-skip {
      position: absolute;
      bottom: 0.75rem; right: 1rem;
      font-size: 0.72rem;
      color: var(--text-muted);
      opacity: 0.6;
      display: none;
    }

    /* ── Choices ── */
    .g-choices { display: flex; flex-wrap: wrap; gap: 0.75rem; }
    .g-btn {
      flex: 1;
      min-width: 200px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text-muted);
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      line-height: 1.4;
      transition: border-color var(--trans), color var(--trans), box-shadow var(--trans);
    }
    .g-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .g-btn--danger:hover {
      border-color: var(--danger);
      color: var(--danger);
      box-shadow: 0 0 20px var(--danger-glow);
    }

    /* ── End badge ── */
    .g-end {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.82rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      display: none;
    }
    .g-end--good { color: var(--accent); display: block; }
    .g-end--bad  { color: var(--danger);  display: block; }

    /* ── Animations ── */
    @keyframes blink     { 50% { opacity: 0; } }
    @keyframes pulse-good {
      0%,100% { transform: translate(-50%,-50%) scale(1); }
      50%     { transform: translate(-50%,-50%) scale(1.15); }
    }
    @keyframes flicker {
      0%,100% { opacity: 1; }
      25%,75% { opacity: 0.25; }
      50%     { opacity: 0.85; }
    }
    @keyframes fadein {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .g-box { padding: 1.5rem; }
      .g-choices { flex-direction: column; }
      .g-btn { min-width: unset; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>

<header class="g-header">
  <span class="g-header__logo">廃病院</span>
  <nav class="g-header__nav">
    <a href="index.html" class="g-header__link">← ポートフォリオ</a>
    <button class="g-header__restart" onclick="init()">最初から</button>
  </nav>
</header>

<main class="g-main">
  <div class="g-glow" id="glow"></div>
  <div class="g-inner">
    <div class="g-status" id="status"></div>
    <div class="g-box" id="box" onclick="skip()">
      <div class="g-text" id="text"></div>
      <span class="g-cursor g-cursor--off" id="cur"></span>
      <span class="g-skip" id="hint">クリックでスキップ</span>
    </div>
    <div class="g-choices" id="choices"></div>
    <div class="g-end" id="end"></div>
  </div>
</main>

<script>
// ── Scene data ────────────────────────────────────────────────────────────
const S = {
  intro: {
    text: [
      '2003年3月——聖白十字病院が廃院してから、4年が経つ。',
      '雑誌記者・藤本優は、噂の廃病院への潜入を決意した。',
      '「最後に取材に入った者が、戻らなかった」——そんな話など、信じていなかった。',
      '今は、まだ。'
    ],
    choices: [{ label: '病院へ向かう →', next: 'entrance' }],
    amb: 'normal'
  },

  entrance: {
    text: [
      '錆びついた鉄製の門扉の前に立つ。',
      '月明かりの下、建物のシルエットが闇に溶けるように佇んでいる。',
      '正面玄関のドアは半開きになっていた。風が吹くたびに、低く軋む音を立てる。'
    ],
    choices: [
      { label: '正面玄関から入る', next: 'lobby' },
      { label: '裏口へ回る', next: 'side_entrance' }
    ],
    amb: 'normal'
  },

  side_entrance: {
    text: [
      '建物の裏手に回ると、雑草が膝まで生い茂っていた。',
      '古い木製のドアが一つ。取っ手を引くと、腐った木の匂いとともに軋みながら開いた。',
      '中庭が見えた。'
    ],
    choices: [{ label: '中庭へ進む', next: 'garden' }],
    amb: 'normal'
  },

  garden: {
    text: [
      '中庭には錆びた車椅子が一台、雑草に埋もれて放置されていた。',
      '風もないのに、車輪がゆっくりと回っている。',
      '内側のドアを開けると、ロビーへ続く廊下が見えた。'
    ],
    choices: [{ label: 'ロビーへ進む', next: 'lobby' }],
    amb: 'normal'
  },

  lobby: {
    text: [
      'ロビーは広く、天井の一部が崩れ落ちていた。',
      '奥に受付カウンターが見える。左手には東へ続く廊下。',
      '空気が淀んでいる。埃と——もう一つ、何か別の匂いがする。'
    ],
    choices: [
      { label: '受付カウンターを調べる', next: 'reception_desk' },
      { label: '東の廊下へ進む', next: 'east_hallway' }
    ],
    amb: 'normal'
  },

  reception_desk: {
    text: [
      '受付カウンターに近づく。患者台帳が散乱している。',
      '引き出しが二つ。右と左。'
    ],
    choices: [
      { label: '右の引き出しを開ける', next: 'key_found' },
      { label: '左の引き出しを開ける', next: 'drawer_empty' },
      { label: 'ロビーに戻る', next: 'lobby' }
    ],
    amb: 'normal'
  },

  key_found: {
    text: [
      '右の引き出しを開けると、古い真鍮の鍵が一本あった。',
      '「305」と小さく刻まれている。',
      '鍵を手に取った。なぜか、手が震えた。'
    ],
    flag: 'has_key',
    choices: [{ label: 'ロビーに戻る', next: 'lobby' }],
    amb: 'normal'
  },

  drawer_empty: {
    text: [
      '左の引き出しを開けると、中は空だった。',
      'いや——よく見ると底に、乾いた血の染みがある。',
      '指でなぞろうとして、やめた。'
    ],
    choices: [
      { label: '右の引き出しも開ける', next: 'key_found' },
      { label: 'ロビーに戻る', next: 'lobby' }
    ],
    amb: 'danger'
  },

  east_hallway: {
    text: [
      '廊下を進む。床板が軋む音が、静寂の中に響く。',
      '左手に「203」と書かれた病室のドアが半開きになっている。',
      '廊下の奥には、階段室へ続く扉が見えた。'
    ],
    choices: [
      { label: '203号室に入る', next: 'room_203' },
      { label: '階段室へ進む', next: 'stairwell' }
    ],
    amb: 'normal'
  },

  room_203: {
    text: [
      '扉を開けると、古びた病室。ベッドが一台。',
      '窓の外には非常階段が見えた。屋上へのドアには、小さな鍵穴がある。',
      'ベッドのシーツが——不自然に盛り上がっていた。'
    ],
    choices: [
      { label: 'ベッドの下を覗く', next: 'under_bed', danger: true },
      { label: '窓の外を確認する', next: 'window' }
    ],
    amb: 'danger'
  },

  under_bed: {
    text: [
      '膝をついてベッドの下を覗き込む。',
      '暗闇の中に——何かがいる。',
      '白く細長い手が、ゆっくりと伸びてきた。',
      '藤本優の悲鳴は、誰にも届かなかった。'
    ],
    choices: [{ label: 'もう一度挑戦する', next: '__restart__' }],
    amb: 'end_bad',
    end: { type: 'bad', label: 'BAD END 1 ─ ベッドの下の住人' }
  },

  window: {
    text: [
      '窓に近づく。外に非常階段が見えた。',
      '屋上へのドアには鍵穴がある。「305」番の鍵があれば——。'
    ],
    choices: [
      { label: '鍵を使って屋上へ出る', next: 'rooftop_escape', cond: 'has_key' },
      { label: '203号室に戻る', next: 'room_203' }
    ],
    amb: 'normal'
  },

  rooftop_escape: {
    text: [
      '鍵が合った。重いドアが、軋みながら開く。',
      '屋上へ出ると、夜明けの光が空を静かに染めていた。',
      '後ろ手でドアに鍵をかけ、あなたは深く息を吸った。',
      '——生きて帰れる。'
    ],
    choices: [{ label: 'もう一度遊ぶ', next: '__restart__' }],
    amb: 'end_good',
    end: { type: 'good', label: 'GOOD END ─ 夜明けの脱出' }
  },

  stairwell: {
    text: [
      '階段室に入ると、上と下への階段が見えた。',
      '地下への扉は半開き。暗く、冷たい空気が漏れている。',
      '上の階からは、水が滴る音がかすかに聞こえた。'
    ],
    choices: [
      { label: '地下へ降りる', next: 'basement', danger: true },
      { label: '3階へ上がる', next: 'third_floor' }
    ],
    amb: 'danger'
  },

  basement: {
    text: [
      '地下への階段を降りていく。',
      '途中から、足首まで冷たい水が満ちていた。',
      '振り返ると、扉が音もなく閉まった。',
      '水位は——上がり続けた。'
    ],
    choices: [{ label: 'もう一度挑戦する', next: '__restart__' }],
    amb: 'end_bad',
    end: { type: 'bad', label: 'BAD END 2 ─ 水没' }
  },

  third_floor: {
    text: [
      '3階の廊下。全てのドアは釘で打ちつけられていた。',
      'ただ一つ——「手術室」と書かれた扉だけが、開いている。'
    ],
    choices: [
      { label: '手術室に入る', next: 'operating_room', danger: true },
      { label: '階段室に戻る', next: 'stairwell' }
    ],
    amb: 'danger'
  },

  operating_room: {
    text: [
      '手術室に踏み込んだ瞬間、背後でドアが閉まった。',
      '台の上に——患者用の拘束具。',
      '天井のライトが、点灯した。',
      '——誰かが、スイッチを押した。'
    ],
    choices: [{ label: 'もう一度挑戦する', next: '__restart__' }],
    amb: 'end_bad',
    end: { type: 'bad', label: 'BAD END 3 ─ 手術台' }
  }
};

// ── State & DOM ───────────────────────────────────────────────────────────
let flags = new Set();
let typing = false;
let skipFn = null;
let timers = [];

const glowEl    = document.getElementById('glow');
const statusEl  = document.getElementById('status');
const boxEl     = document.getElementById('box');
const textEl    = document.getElementById('text');
const curEl     = document.getElementById('cur');
const hintEl    = document.getElementById('hint');
const choicesEl = document.getElementById('choices');
const endEl     = document.getElementById('end');

// ── Helpers ───────────────────────────────────────────────────────────────
function clearTimers() { timers.forEach(clearTimeout); timers = []; }
function later(fn, ms) { const t = setTimeout(fn, ms); timers.push(t); }

// ── Ambience ──────────────────────────────────────────────────────────────
function setAmb(amb) {
  glowEl.className = 'g-glow';
  boxEl.classList.remove('g-box--danger');

  if (amb === 'danger') {
    glowEl.classList.add('g-glow--danger');
    boxEl.classList.add('g-box--danger');
  } else if (amb === 'end_good') {
    glowEl.classList.add('g-glow--end-good');
  } else if (amb === 'end_bad') {
    glowEl.classList.add('g-glow--end-bad');
    let n = 0;
    const iv = setInterval(() => {
      boxEl.style.animation = 'flicker 0.2s ease';
      setTimeout(() => { boxEl.style.animation = ''; }, 200);
      if (++n >= 5) clearInterval(iv);
    }, 280);
  }
}

// ── Inventory ─────────────────────────────────────────────────────────────
function renderStatus() {
  statusEl.innerHTML = flags.has('has_key')
    ? '<span class="g-item">🗝 305号室の鍵</span>'
    : '';
}

// ── Typewriter ────────────────────────────────────────────────────────────
function typewriter(paras, done) {
  clearTimers();
  skipFn = null;
  typing = true;
  textEl.innerHTML = '';
  curEl.classList.remove('g-cursor--off');
  hintEl.style.display = 'block';

  let pi = 0, ci = 0, el = null, between = false, finished = false;

  function finish() {
    if (finished) return;
    finished = true;
    skipFn = null;
    typing = false;
    curEl.classList.add('g-cursor--off');
    hintEl.style.display = 'none';
    done();
  }

  function addP(t) {
    const p = document.createElement('p');
    p.textContent = t;
    textEl.appendChild(p);
    return p;
  }

  function showRest() {
    clearTimers();
    if (!between && el && pi < paras.length) {
      el.textContent = paras[pi];
      for (let i = pi + 1; i < paras.length; i++) addP(paras[i]);
    } else {
      for (let i = pi; i < paras.length; i++) addP(paras[i]);
    }
    finish();
  }

  skipFn = showRest;

  function nextPara() {
    if (finished) return;
    between = false;
    if (pi >= paras.length) { finish(); return; }
    el = addP('');
    ci = 0;
    typeChar();
  }

  function typeChar() {
    if (finished) return;
    const txt = paras[pi];
    if (ci >= txt.length) {
      between = true;
      pi++;
      later(nextPara, 350);
      return;
    }
    el.textContent = txt.slice(0, ++ci);
    const delay = '。、！？…—'.includes(txt[ci - 1]) ? 120 : 35;
    later(typeChar, delay);
  }

  nextPara();
}

function skip() { if (typing && skipFn) skipFn(); }

// ── Choices ───────────────────────────────────────────────────────────────
function renderChoices(choices) {
  choicesEl.innerHTML = '';
  choices.forEach(c => {
    if (c.cond && !flags.has(c.cond)) return;
    const btn = document.createElement('button');
    btn.className = 'g-btn' + (c.danger ? ' g-btn--danger' : '');
    btn.textContent = c.label;
    btn.onclick = () => c.next === '__restart__' ? init() : goto(c.next);
    choicesEl.appendChild(btn);
  });
}

// ── Navigation ────────────────────────────────────────────────────────────
function goto(id) {
  clearTimers();
  skipFn = null;
  typing = false;
  choicesEl.innerHTML = '';
  endEl.className = 'g-end';
  boxEl.classList.add('g-box--faded');
  later(() => {
    boxEl.classList.remove('g-box--faded');
    render(id);
  }, 300);
}

// ── Render ────────────────────────────────────────────────────────────────
function render(id) {
  const scene = S[id];
  if (!scene) return;
  if (scene.flag) { flags.add(scene.flag); renderStatus(); }
  setAmb(scene.amb);
  typewriter(scene.text, () => {
    renderChoices(scene.choices);
    if (scene.end) {
      endEl.textContent = scene.end.label;
      endEl.className = 'g-end g-end--' + scene.end.type;
    }
  });
}

// ── Init ──────────────────────────────────────────────────────────────────
function init() {
  clearTimers();
  skipFn = null;
  typing = false;
  flags = new Set();
  choicesEl.innerHTML = '';
  endEl.className = 'g-end';
  glowEl.className = 'g-glow';
  boxEl.className = 'g-box';
  boxEl.style.animation = '';
  renderStatus();
  render('intro');
}

init();
</script>
</body>
</html>
